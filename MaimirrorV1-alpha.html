<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>You Fan Zhuan.</title>
</head>
<style>
    body{
        background-color: rgb(35, 35, 35);
    }
    .input{
        width: 44%;
        height: 600px;
        position: absolute;
        top: 50px;
        left: 3%;
        background-color: rgb(175, 175, 175);
    }
    #input_title{
        font-size: 20px;
        font-family: sans-serif;
        position: relative;
        top: 5px;
        text-align: center;
    }
    #in1Id{
        width: 90%;
        height: 75%;
        position: absolute;
        top: 5%;
        left: 5%;

    }
    .btndiv{
        position: absolute;
        bottom: 38px;  
        height: 10%;
        width: 100%;
    }
    #btnwrpx{
        position: relative;
        top: 5%;
        left: 20px;
        width: 42%;
        padding: 2px 2px;
        font-size: 16px;
    }
    #btnwrpy{
        position: absolute;
        top: 5%;
        right: 20px;
        width: 42%;
        padding: 2px 2px;
        font-size: 16px;
    }
    #btnc{
        position: absolute;
        top: 90%;
        font-size: 16px;
        left: 30%;
        width: 40%;
        padding: 2px 2px;
    }

    .output{
        width: 44%;
        height: 600px;
        position: absolute;
        top: 50px;
        right: 4%;
        background-color: rgb(175, 175, 175);
    }
    #output_title{
        font-size: 20px;
        font-family: sans-serif;
        position: relative;
        top: 5px;
        text-align: center;
    }
    #outputTxt{
        background-color: rgb(230, 228, 219);
        width: 90%;
        height: 75%;
        position: absolute;
        top: 5%;
        left: 5%;
        padding: 4px 4px;
    }
    #outputBottom{
        width: 100%;
        height: 20%;
        position: absolute;
        bottom: -30px;
        font-size: 40px;
        text-align: center;
    }

    .lang{
        position: absolute;
        top: 10px;
        right: 10px;
        background-color: white;
        padding: 5px;   
    }
</style>
<body>

    <div class="input">
        <div id="input_title">Input</div>
        <textarea name="in1" id="in1Id" class="in1c"></textarea>

        <div class="btndiv">
            <button id="btnwrpx" onclick="XBtnClicked()">symmetry with respect to x-axis</button>
            <button id="btnwrpy" onclick="YBtnClicked()">symmetry with respect to y-axis</button>
            <button id="btnc" onclick="rotateBtnClicked()">rotate π with respect to centre</button>
        </div>

    </div>

    
    <div class="output">
        <div id="output_title">Output</div>

        <div Id="outputTxt"></div>
        <div Id="outputBottom"></div>
    </div>

    <script>

        function replaceCharDayo(strInDayo,indexDayo,charDayo,lengthDayo){
            return strInDayo.substring(0,indexDayo) + charDayo + strInDayo.substring(indexDayo+1,lengthDayo);
        }

        const rotateC = {"1":"5","2":"6","3":"7","4":"8","5":"1","6":"2","7":"3","8":"4"};
        const symWRTX = {"1":"4","2":"3","3":"2","4":"1","5":"8","6":"7","7":"6","8":"5"};
        const symWRTY = {"1":"8","2":"7","3":"6","4":"5","5":"4","6":"3","7":"2","8":"1"};
        
        const symmetrySlideLR = {"<":">",">":"<"};
        const symmetrySlideRotation = {"p":"q","q":"p","s":"z","z":"s"}

        const symmetryXTouchCD = {"1":"5","2":"4","3":"3","4":"2","5":"1","6":"8","7":"7","8":"6"};
        const symmetryYTouchCD = {"1":"1","2":"8","3":"7","4":"6","5":"5","6":"4","7":"3","2":"8"};

        const regexN = /[1-8](?=[1-8]*\,|b|f|h|x|\/|V|v|p|q|s|z|w|\-|\<|\>|\^|\[|\@|\`|\?|\!|\$)/g;
        //                           notes         |       slide                | special notes
        //|b|f|h|x|\/|V|v|p|q|s|z|w|\-|\<|\>|\^|\
        const regexSlideLR = /\<|\>/g;
        const regexSlideRotation = /p|q|s|z/g;
        const regexTouchCD  = /(?<=E|D)[1-8]/g;

        
        function rotateBtnClicked(){

            var textIn = document.getElementById("in1Id").value;
            //console.log(textIn);
            var textinlengthDesu = textIn.length;
            
            //replace...
            let textbefinden, textOut = textIn;
            console.log(1);
            console.log(textOut);
            
            //replace numbers
            while ((textbefinden = regexN.exec(textIn) )!== null){
                //console.log(textbefinden[0]);
                //console.log(rotateC[textbefinden[0]]);
                textOut = replaceCharDayo(textOut, textbefinden["index"], rotateC[textbefinden[0]],textinlengthDesu); 
                console.log(textOut);
                console.log(textbefinden);  
            }


            //replace slideLR
            while((textbefinden = regexSlideLR.exec(textIn)) !== null){

                textOut = replaceCharDayo(textOut, textbefinden["index"], symmetrySlideLR[textbefinden[0]],textinlengthDesu);
                console.log(textOut);
            }




            //console.log(textIn);
            document.getElementById("outputTxt").innerText = textOut;
            document.getElementById("outputBottom").innerText = "pi rotated with respect to centre";

        }


        function XBtnClicked(){

            var textIn = document.getElementById("in1Id").value;
            //console.log(textIn);
            var textinlengthDesu = textIn.length;
            
            //replace...
            let textbefinden, textOut = textIn;
            
            //replace numbers
            while ((textbefinden = regexN.exec(textIn) )!== null){
                //console.log(textbefinden[0]);
                //console.log(rotateC[textbefinden[0]]);
                textOut = replaceCharDayo(textOut, textbefinden["index"], symWRTX[textbefinden[0]]); 
                
                //console.log(textbefinden);  
            }
            
            //E and D touch readjustment
            while((textbefinden = regexTouchCD.exec(textIn)) !== null){
                console.log(textbefinden);  
                textOut = replaceCharDayo(textOut, textbefinden["index"], symmetryXTouchCD[textbefinden[0]]);
            }

            //rotation oriented slides adjustment
            while((textbefinden = regexSlideRotation.exec(textIn)) !== null){
                console.log(textbefinden);  
                textOut = replaceCharDayo(textOut, textbefinden["index"], symmetrySlideRotation[textbefinden[0]],textinlengthDesu);
            }
            
            //console.log(textIn);
            document.getElementById("outputTxt").innerText = textOut;
            document.getElementById("outputBottom").innerText = "symmetric with respect to the x-axis";

        }


        function YBtnClicked(){

            var textIn = document.getElementById("in1Id").value;
            //console.log(textIn);
            var textinlengthDesu = textIn.length;
            
            //replace...
            let textbefinden, textOut = textIn;
            
            //replace numbers
            while ((textbefinden = regexN.exec(textIn) )!== null){
                //console.log(textbefinden[0]);
                //console.log(rotateC[textbefinden[0]]);
                textOut = replaceCharDayo(textOut, textbefinden["index"], symWRTY[textbefinden[0]]); 
                
                //console.log(textbefinden);  
            }


            //slide symmetry
            while((textbefinden = regexSlideLR.exec(textIn)) !== null){
                 textOut = replaceCharDayo(textOut, textbefinden["index"], symmetrySlideLR[textbefinden[0]]);
            }

            //E and D touch adjustment
            while((textbefinden = regexTouchCD.exec(textIn)) !== null){
                 textOut = replaceCharDayo(textOut, textbefinden["index"], symmetryYTouchCD[textbefinden[0]]);
            }

            //rotation oriented slides adjustment
            while((textbefinden = regexSlideRotation.exec(textIn)) !== null){
                console.log(textbefinden);  
                textOut = replaceCharDayo(textOut, textbefinden["index"], symmetrySlideRotation[textbefinden[0]],textinlengthDesu);
            }
            

            document.getElementById("outputTxt").innerText = textOut;
            document.getElementById("outputBottom").innerText = "symmetric with respect to the y-axis";
        }


    </script>
</body>
</html>
